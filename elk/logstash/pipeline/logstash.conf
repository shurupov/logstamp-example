input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Парсим JSON если приходит как строка
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  mutate {
    remove_field => [ "timestamp" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "demo-logs-app-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "elastic123"

    # Или без аутентификации если security отключен:
    # hosts => ["http://elasticsearch:9200"]
    # index => "demo-logs-app-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}