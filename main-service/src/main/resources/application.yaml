server:
  servlet:
    context-path: /api
  port: 8001

spring:
  application:
    name: main-service

  cloud:
    openfeign:
      client:
        config:
          default:
            loggerLevel: full

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    org.zalando.logbook: TRACE
    com.logging.presentation: DEBUG

feign:
  client-adapter: http://localhost:8002/api
  delivery-adapter: http://localhost:8003/api